---
# PhraseVault install — delegates to the correct sub-task file based on install_type

- name: "PhraseVault | Validate install_type"
  ansible.builtin.assert:
    that:
      - install_type in ['saltbox', 'ubuntu', 'custom']
    fail_msg: "install_type must be one of: saltbox, ubuntu, custom"

- name: "PhraseVault | Install Docker CE (ubuntu)"
  when: install_type == 'ubuntu'
  block:
    - name: "PhraseVault | Docker | Install apt deps"
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: "PhraseVault | Docker | Add Docker GPG key"
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: "PhraseVault | Docker | Add Docker apt repo"
      ansible.builtin.shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: "PhraseVault | Docker | Install Docker CE packages"
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: "PhraseVault | Docker | Enable and start Docker service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

- name: "PhraseVault | Create data directory"
  ansible.builtin.file:
    path: "{{ phrasevault_data_dir }}"
    state: directory
    owner: "{{ phrasevault_uid }}"
    group: "{{ phrasevault_gid }}"
    mode: "0750"
  become: true

- name: "PhraseVault | Build image from source"
  when: phrasevault_build_from_source | bool
  block:
    - name: "PhraseVault | Clone repo for build"
      ansible.builtin.git:
        repo: "{{ phrasevault_repo_url }}"
        dest: "{{ phrasevault_build_dir }}"
        version: "{{ phrasevault_repo_version }}"
        force: true

    - name: "PhraseVault | Build Docker image"
      community.docker.docker_image:
        name: "{{ phrasevault_image }}"
        build:
          path: "{{ phrasevault_build_dir }}"
        source: build
        force_source: true

    - name: "PhraseVault | Clean up build directory"
      ansible.builtin.file:
        path: "{{ phrasevault_build_dir }}"
        state: absent

- name: "PhraseVault | Pull Docker image from GHCR"
  when: not (phrasevault_build_from_source | bool)
  community.docker.docker_image:
    name: "{{ phrasevault_image }}"
    source: pull
    force_source: true

- name: "PhraseVault | Deploy (saltbox)"
  ansible.builtin.include_tasks: saltbox.yml
  when: install_type == 'saltbox'

- name: "PhraseVault | Deploy (ubuntu)"
  ansible.builtin.include_tasks: ubuntu.yml
  when: install_type == 'ubuntu'

- name: "PhraseVault | Deploy (custom)"
  ansible.builtin.include_tasks: custom.yml
  when: install_type == 'custom'

- name: "PhraseVault | Register Cloudflare DNS record"
  when: (phrasevault_traefik_enabled | bool) and (phrasevault_cloudflare_dns | bool)
  block:
    - name: "PhraseVault | Cloudflare | Read Saltbox accounts for credentials"
      ansible.builtin.slurp:
        src: "{{ phrasevault_saltbox_accounts_path }}"
      register: _sb_accounts_raw

    - name: "PhraseVault | Cloudflare | Parse credentials"
      ansible.builtin.set_fact:
        _sb_cf: "{{ (_sb_accounts_raw.content | b64decode | from_yaml).cloudflare }}"

    - name: "PhraseVault | Cloudflare | Get public IP"
      ansible.builtin.uri:
        url: https://api.ipify.org
        return_content: true
      register: _public_ip

    - name: "PhraseVault | Cloudflare | Add A record for {{ phrasevault_domain }}"
      community.general.cloudflare_dns:
        account_api_token: "{{ _sb_cf.api }}"
        account_email: "{{ _sb_cf.email }}"
        zone: "{{ phrasevault_traefik_zone }}"
        state: present
        solo: true
        proxied: "{{ phrasevault_dns_proxied | bool }}"
        type: A
        value: "{{ _public_ip.content | trim }}"
        record: "{{ phrasevault_domain | replace('.' + phrasevault_traefik_zone, '') }}"
      delegate_to: localhost

- name: "PhraseVault | Wait for container to be healthy"
  community.docker.docker_container_info:
    name: "{{ phrasevault_container_name }}"
  register: pv_info
  until: pv_info.container.State.Health.Status == 'healthy'
  retries: 20
  delay: 10
