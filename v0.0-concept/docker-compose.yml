version: '3.9'

services:
  phrasevault:
    build: .
    container_name: phrasevault
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      PV_API_KEY: "${PV_API_KEY:-changeme}"   # set this in .env or shell
      PV_DB_PATH: /data/phrasevault.db
      PV_LOG_LEVEL: INFO
      PV_DOCS: "0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s