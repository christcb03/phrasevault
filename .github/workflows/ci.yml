name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libdbus (Linux secret-service backend of pvfs-companion)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test (spec §14 suite)
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: CLI smoke suite
        run: |
          cargo build --release -p pvfs-cli -p pvfsd -p pvfs-companion
          PVFS_BIN="$PWD/target/release/pvfs" bash deploy/ansible/files/smoke-test.sh
