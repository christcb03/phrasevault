# PVFS daemon socket directory (systemd-tmpfiles).
# Install as /etc/tmpfiles.d/pvfs.conf, then `systemd-tmpfiles --create`.
#
# World-traversable + sticky (like /tmp), so any user's pvfsd can place its
# `<forest_id>.sock` here and other users can connect — access is ACL-gated, not
# socket-permission-gated (doc 06 §2). Each socket is owned by its daemon's user
# and the sticky bit stops users deleting each other's. Matches the daemon's own
# default mode when it creates the dir itself (pvfsd/src/main.rs).
d /run/pvfs 1777 root root -
