# Copy to inventory.ini and set your target host.
# inventory.ini is gitignored — do not commit hostnames, IPs, or credentials.
# Group name must match pipeline.yml (default: pvfs_hosts), or pass -e target_hosts=your_group

[pvfs_hosts]
pvfs-test ansible_host=<host> ansible_user=<user>

[pvfs_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
# Optional if your key is not the default:
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
