# Copy to inventory.ini and adjust. presubuntu = Proxmox VM 101
# (reset to a clean Ubuntu host via the Homelab repo: ./scripts/presubuntu-reset.sh)

[presubuntu]
presubuntu ansible_host=192.168.0.184 ansible_user=chris

[presubuntu:vars]
ansible_python_interpreter=/usr/bin/python3
# Optional if your key is not the default:
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
