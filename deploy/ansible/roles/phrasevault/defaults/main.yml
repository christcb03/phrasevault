---
# ── Install type ───────────────────────────────────────────────────────────────
# saltbox    : Saltbox Docker network + Traefik labels + Watchtower managed
# ubuntu     : plain Docker on Ubuntu, direct port binding + Watchtower
# custom     : override everything yourself
install_type: ubuntu

# ── Image ─────────────────────────────────────────────────────────────────────
phrasevault_image: "ghcr.io/christcb03/phrasevault:latest"
phrasevault_container_name: phrasevault

# ── Build from source (use until first GHCR image is available) ───────────────
# Set to true to clone the repo and build locally instead of pulling from GHCR.
phrasevault_build_from_source: false
phrasevault_repo_url: "https://github.com/christcb03/phrasevault.git"
phrasevault_repo_version: "main"
phrasevault_build_dir: "/tmp/phrasevault-build"

# ── Data ──────────────────────────────────────────────────────────────────────
phrasevault_data_dir: /opt/phrasevault/data

# ── Network ───────────────────────────────────────────────────────────────────
phrasevault_docker_network: "saltbox"   # ignored for ubuntu install_type
phrasevault_port: "8080"               # host port for ubuntu install_type

# ── Traefik ────────────────────────────────────────────────────────────────────
# Set phrasevault_traefik_enabled: true to expose the container via Traefik
# (HTTPS + cert from Cloudflare DNS challenge). The saltbox Docker network must
# exist on the target host.  The direct port binding stays in place for VPN
# access alongside the Traefik HTTPS route.
phrasevault_traefik_enabled: false
phrasevault_domain: ""                # e.g. pvtest.turnernetworking.com
phrasevault_traefik_router: phrasevault
phrasevault_traefik_certresolver: cfdns
phrasevault_traefik_middlewares: "globalHeaders@file,hsts@file"

# ── Runtime config ─────────────────────────────────────────────────────────────
# PV_PASSPHRASE is the identity key — every node's feed is derived from this.
# Store it in Ansible Vault: vault_phrasevault_passphrase
# Generate a strong one: openssl rand -base64 32
phrasevault_passphrase: "{{ vault_phrasevault_passphrase }}"
phrasevault_log_level: info

# ── Watchtower (ubuntu only) ───────────────────────────────────────────────────
# Polls GHCR and restarts the container when a new image is pushed by CI.
# This is your CD loop — no SSH from GitHub needed.
phrasevault_watchtower_enabled: true
phrasevault_watchtower_interval: 300    # seconds between GHCR polls (5 min)

# ── System user (non-saltbox only) ────────────────────────────────────────────
phrasevault_uid: 1000
phrasevault_gid: 1000
