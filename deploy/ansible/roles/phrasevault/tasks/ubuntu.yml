---
# Ubuntu deployment — plain Docker, direct port binding, Watchtower for auto-updates.

- name: "PhraseVault | Ubuntu | Deploy container"
  community.docker.docker_container:
    name: "{{ phrasevault_container_name }}"
    image: "{{ phrasevault_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ phrasevault_port }}:8080"
    volumes:
      - "{{ phrasevault_data_dir }}:/data"
    env:
      PV_PASSPHRASE: "{{ phrasevault_passphrase }}"
      PV_DATA_DIR: "/data"
      PV_PORT: "8080"
      PV_HOST: "0.0.0.0"
      PV_LOG_LEVEL: "{{ phrasevault_log_level }}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "15s"

- name: "PhraseVault | Ubuntu | Deploy Watchtower for auto-updates"
  when: phrasevault_watchtower_enabled | bool
  community.docker.docker_container:
    name: "watchtower-phrasevault"
    image: "containrrr/watchtower:latest"
    state: started
    restart_policy: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    env:
      WATCHTOWER_POLL_INTERVAL: "{{ phrasevault_watchtower_interval | string }}"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: "{{ phrasevault_container_name }}"

- name: "PhraseVault | Ubuntu | Show access info"
  ansible.builtin.debug:
    msg:
      - "PhraseVault is running at http://{{ ansible_host }}:{{ phrasevault_port }}"
      - "Watchtower polls GHCR every {{ phrasevault_watchtower_interval }}s and auto-updates on new CI pushes"
