---
# Ubuntu deployment — plain Docker, no Traefik, direct port binding.
# Use this when there's no Saltbox/Traefik stack on the host.

- name: "PhraseVault | Ubuntu | Deploy container"
  community.docker.docker_container:
    name: "{{ phrasevault_container_name }}"
    image: "{{ phrasevault_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ phrasevault_port }}:8080"
    volumes:
      - "{{ phrasevault_data_dir }}:/data"
    env:
      PV_API_KEY: "{{ phrasevault_api_key }}"
      PV_DB_PATH: "/data/phrasevault.db"
      PV_LOG_LEVEL: "{{ phrasevault_log_level }}"
      PV_DOCS: "{{ phrasevault_docs_enabled }}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "10s"

- name: "PhraseVault | Ubuntu | Confirm port binding"
  ansible.builtin.debug:
    msg: "PhraseVault listening on http://{{ inventory_hostname }}:{{ phrasevault_port }}"
