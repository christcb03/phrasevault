---
# Ubuntu deployment — plain Docker, Watchtower for auto-updates.
# With phrasevault_traefik_enabled: true, also joins the saltbox network and
# adds Traefik labels for HTTPS via Cloudflare DNS challenge.  The direct port
# binding stays in place so VPN access continues to work alongside HTTPS.

- name: "PhraseVault | Ubuntu | Deploy container"
  community.docker.docker_container:
    name: "{{ phrasevault_container_name }}"
    image: "{{ phrasevault_image }}"
    state: started
    restart_policy: unless-stopped
    pull: always
    ports:
      - "{{ phrasevault_port }}:8081"
    volumes:
      - "{{ phrasevault_data_dir }}:/data"
    networks: "{{ [{'name': phrasevault_docker_network}] if phrasevault_traefik_enabled | bool else omit }}"
    networks_cli_compatible: false
    env:
      PV_DATA_DIR: "/data"
      PV_PORT: "8081"
      PV_HOST: "0.0.0.0"
      PV_LOG_LEVEL: "{{ phrasevault_log_level }}"
      PV_TMDB_KEY: "{{ phrasevault_tmdb_key | default('') }}"
    labels: "{{ {'traefik.enable': 'false'} }}"
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:8081/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "15s"

- name: "PhraseVault | Ubuntu | Deploy Watchtower for auto-updates"
  when: phrasevault_watchtower_enabled | bool
  community.docker.docker_container:
    name: "watchtower-phrasevault"
    image: "containrrr/watchtower:latest"
    state: started
    restart_policy: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    env:
      DOCKER_API_VERSION: "1.41"
      WATCHTOWER_POLL_INTERVAL: "{{ phrasevault_watchtower_interval | string }}"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATION_REPORT: "true"
      WATCHTOWER_NOTIFICATIONS_HOSTNAME: "{{ ansible_hostname }}"
      WATCHTOWER_NOTIFICATION_URL: "{{ phrasevault_watchtower_notify_url | default('') }}"
    command: "{{ phrasevault_container_name }}"

- name: "PhraseVault | Ubuntu | Show access info"
  ansible.builtin.debug:
    msg: >-
      PhraseVault running at http://{{ ansible_host }}:{{ phrasevault_port }}
      {% if phrasevault_traefik_enabled | bool %} and https://{{ phrasevault_domain }}{% endif %}.
      Watchtower polls GHCR every {{ phrasevault_watchtower_interval }}s.
