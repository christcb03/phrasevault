---
# Custom deployment — override all variables in your playbook.
# This task file is intentionally minimal; callers set everything via vars.

- name: "PhraseVault | Custom | Deploy container"
  community.docker.docker_container:
    name: "{{ phrasevault_container_name }}"
    image: "{{ phrasevault_image }}"
    state: started
    restart_policy: unless-stopped
    networks: "{{ phrasevault_custom_networks | default(omit) }}"
    ports: "{{ phrasevault_custom_ports | default(omit) }}"
    volumes:
      - "{{ phrasevault_data_dir }}:/data"
    env:
      PV_DATA_DIR: "/data"
      PV_PORT: "8081"
      PV_HOST: "0.0.0.0"
      PV_LOG_LEVEL: "{{ phrasevault_log_level }}"
      PV_TMDB_KEY: "{{ phrasevault_tmdb_key | default('') }}"
    labels: "{{ phrasevault_custom_labels | default({}) }}"
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:8081/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "15s"
